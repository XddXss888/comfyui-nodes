name: Daily Llamacpp Scan

on:
  schedule:
    # Beijing time 08:00 = UTC 00:00 (run 5 min after ComfyUI scan)
    - cron: '5 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-llamacpp-scan
  cancel-in-progress: false

jobs:
  scan:
    name: Run llamacpp scan
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run scan pipeline
        working-directory: llamacpp
        run: |
          python run_pipeline.py --输出json --输出中间文件

      - name: Commit results if changed
        working-directory: llamacpp
        run: |
          cd ..
          if git diff --quiet -- llamacpp/; then
            echo "No changes in llamacpp/"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add llamacpp/noauth_chat.md llamacpp/noauth_chat.jsonl llamacpp/kept.jsonl llamacpp/model_scan.jsonl 2>/dev/null || true
          git add llamacpp/noauth_chat.md 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Nothing staged"
            exit 0
          fi
          git commit -m "auto: 每日 Llamacpp 节点扫描报告"
          git push
