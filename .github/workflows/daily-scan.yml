name: Daily Scan

on:
  schedule:
    # Beijing time 08:00 = UTC 00:00
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-scan
  cancel-in-progress: false

env:
  GH_TOKEN: ${{ secrets.CODESPACE_PAT }}
  CODESPACE_REPO: ${{ github.repository }}
  CODESPACE_BRANCH: ${{ github.ref_name }}
  CODESPACE_MACHINE: basicLinux32gb
  CODESPACE_NAME: daily-scan-${{ github.run_id }}
  # Codespace workspace root (repo name after rename)
  WS: /workspaces/public-nodes

jobs:
  scan:
    name: Run all scans
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Check required secret
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "::error::Missing repository secret CODESPACE_PAT"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Codespace
        id: codespace
        run: |
          set -euo pipefail
          name=$(gh codespace create \
            --repo "${CODESPACE_REPO}" \
            --branch "${CODESPACE_BRANCH}" \
            --machine "${CODESPACE_MACHINE}" \
            --display-name "${CODESPACE_NAME}" \
            --idle-timeout 30m \
            --retention-period 1h \
            --default-permissions | tail -n 1)
          echo "name=${name}" >> "${GITHUB_OUTPUT}"

      - name: Wait for Codespace
        run: |
          set -euo pipefail
          cs="${{ steps.codespace.outputs.name }}"
          for i in $(seq 1 60); do
            state=$(gh codespace list --repo "${CODESPACE_REPO}" --json name,state \
              --jq ".[] | select(.name == \"${cs}\") | .state")
            echo "[$i] ${state:-unknown}"
            if [ "${state}" = "Available" ]; then exit 0; fi
            sleep 10
          done
          echo "::error::Codespace timeout"; exit 1

      - name: Pull latest in Codespace
        run: |
          cs="${{ steps.codespace.outputs.name }}"
          gh codespace ssh -c "${cs}" -- "cd ${WS} && git pull --ff-only"

      # ────────────────────────────────────────────
      # Project: comfyui
      # ────────────────────────────────────────────
      - name: "comfyui: scan"
        run: |
          cs="${{ steps.codespace.outputs.name }}"
          gh codespace ssh -c "${cs}" -- \
            "cd ${WS}/comfyui && python3 comfyui_scan.py -f comfyui.csv -w 200"

      - name: "comfyui: copy report"
        run: |
          cs="${{ steps.codespace.outputs.name }}"
          gh codespace cp -c "${cs}" -e "remote:${WS}/comfyui/report.md" comfyui/report.md

      # ────────────────────────────────────────────
      # Project: llamacpp
      # ────────────────────────────────────────────
      - name: "llamacpp: scan"
        run: |
          cs="${{ steps.codespace.outputs.name }}"
          gh codespace ssh -c "${cs}" -- \
            "cd ${WS}/llamacpp && python3 run_pipeline.py --输出json --输出中间文件"

      - name: "llamacpp: copy reports"
        run: |
          cs="${{ steps.codespace.outputs.name }}"
          gh codespace cp -c "${cs}" -e "remote:${WS}/llamacpp/noauth_chat.md" llamacpp/noauth_chat.md || true
          gh codespace cp -c "${cs}" -e "remote:${WS}/llamacpp/noauth_chat.jsonl" llamacpp/noauth_chat.jsonl || true

      # ────────────────────────────────────────────
      # Project: antigravity
      # ────────────────────────────────────────────
      - name: "antigravity: scan"
        run: |
          cs="${{ steps.codespace.outputs.name }}"
          gh codespace ssh -c "${cs}" -- \
            "cd ${WS}/antigravity && python3 run_pipeline.py"

      - name: "antigravity: copy report"
        run: |
          cs="${{ steps.codespace.outputs.name }}"
          gh codespace cp -c "${cs}" -e "remote:${WS}/antigravity/report.md" antigravity/report.md || true

      # ────────────────────────────────────────────
      # 添加新项目时，复制上面的 block，改目录和命令即可
      # ────────────────────────────────────────────

      # ── Commit ──
      - name: Commit reports
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add comfyui/report.md llamacpp/noauth_chat.md llamacpp/noauth_chat.jsonl antigravity/report.md 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes"; exit 0
          fi
          git commit -m "auto: 每日扫描报告"
          git push

      # ── Cleanup ──
      - name: Delete Codespace
        if: always() && steps.codespace.outputs.name != ''
        run: gh codespace delete -c "${{ steps.codespace.outputs.name }}" --force || true
