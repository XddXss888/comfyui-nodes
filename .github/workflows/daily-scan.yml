name: Daily Scan (ComfyUI + Llamacpp)

on:
  schedule:
    # Beijing time 08:00 = UTC 00:00
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-scan
  cancel-in-progress: false

jobs:
  scan:
    name: Run all scans in one Codespace
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      GH_TOKEN: ${{ secrets.CODESPACE_PAT }}
      CODESPACE_REPO: ${{ github.repository }}
      CODESPACE_BRANCH: ${{ github.ref_name }}
      CODESPACE_MACHINE: basicLinux32gb
      CODESPACE_NAME: daily-scan-${{ github.run_id }}
    steps:
      - name: Check required secret
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "::error::Missing repository secret CODESPACE_PAT"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Codespace
        id: codespace
        run: |
          set -euo pipefail
          codespace_name=$(gh codespace create \
            --repo "${CODESPACE_REPO}" \
            --branch "${CODESPACE_BRANCH}" \
            --machine "${CODESPACE_MACHINE}" \
            --display-name "${CODESPACE_NAME}" \
            --idle-timeout 30m \
            --retention-period 1h \
            --default-permissions | tail -n 1)
          echo "name=${codespace_name}" >> "${GITHUB_OUTPUT}"

      - name: Wait for Codespace
        run: |
          set -euo pipefail
          codespace="${{ steps.codespace.outputs.name }}"
          for attempt in $(seq 1 60); do
            state=$(gh codespace list --repo "${CODESPACE_REPO}" --json name,state --jq ".[] | select(.name == \"${codespace}\") | .state")
            echo "Attempt ${attempt}: ${state:-unknown}"
            if [ "${state}" = "Available" ]; then exit 0; fi
            sleep 10
          done
          echo "::error::Codespace did not become available"
          exit 1

      # ── ComfyUI Scan ──
      - name: "ComfyUI: Run scan"
        run: |
          set -euo pipefail
          codespace="${{ steps.codespace.outputs.name }}"
          gh codespace ssh -c "${codespace}" -- \
            'cd /workspaces/comfyui-nodes && git pull --ff-only && python3 comfyui_scan.py -f comfyui.csv -w 200'

      - name: "ComfyUI: Copy report"
        run: |
          codespace="${{ steps.codespace.outputs.name }}"
          gh codespace cp -c "${codespace}" -e 'remote:/workspaces/comfyui-nodes/report.md' report.md

      # ── Llamacpp Scan ──
      - name: "Llamacpp: Run scan"
        run: |
          set -euo pipefail
          codespace="${{ steps.codespace.outputs.name }}"
          gh codespace ssh -c "${codespace}" -- \
            'cd /workspaces/comfyui-nodes/llamacpp && python3 run_pipeline.py --输出json --输出中间文件'

      - name: "Llamacpp: Copy reports"
        run: |
          codespace="${{ steps.codespace.outputs.name }}"
          gh codespace cp -c "${codespace}" -e 'remote:/workspaces/comfyui-nodes/llamacpp/noauth_chat.md' llamacpp/noauth_chat.md || true
          gh codespace cp -c "${codespace}" -e 'remote:/workspaces/comfyui-nodes/llamacpp/noauth_chat.jsonl' llamacpp/noauth_chat.jsonl || true

      # ── Commit all results ──
      - name: Commit reports if changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add report.md llamacpp/noauth_chat.md llamacpp/noauth_chat.jsonl 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "auto: 每日扫描报告 (ComfyUI + Llamacpp)"
          git push

      # ── Cleanup ──
      - name: Delete Codespace
        if: always() && steps.codespace.outputs.name != ''
        run: |
          gh codespace delete -c "${{ steps.codespace.outputs.name }}" --force || true
